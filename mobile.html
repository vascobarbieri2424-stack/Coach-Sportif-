<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aujourd'hui — Football</title>
<style>
:root{
  --bg:#0D1117;--surface:#161B22;--card:#1C2128;--border:#30363D;
  --text:#E6EDF3;--mid:#8B949E;--dim:#484F58;
  --green:#3FB950;--green-d:#1A3B1E;
  --blue:#58A6FF;--orange:#F0883E;--red:#F85149;--red-d:#3B0F0D;
  --purple:#BC8CFF;--yellow:#E3B341;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;
  overscroll-behavior:none;}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.92);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:12px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-.5px;}
.tb-date{font-size:12px;color:var(--mid);margin-top:2px;}
.tb-btn{padding:7px 14px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.tb-settings{background:var(--card);color:var(--mid);}

/* SECTION TITLE */
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--dim);padding:0 16px;margin:20px 0 8px;}

/* DAY SELECTOR */
.day-scroll{display:flex;gap:8px;padding:0 16px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;padding-bottom:4px;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;
  transition:all .15s;}
.day-chip.active{background:var(--green-d);color:var(--green);border-color:var(--green);}

/* WEEK SELECTOR */
.week-scroll{display:flex;gap:6px;padding:0 16px;overflow-x:auto;
  scrollbar-width:none;padding-bottom:4px;}
.week-scroll::-webkit-scrollbar{display:none;}
.week-chip{flex-shrink:0;width:44px;height:44px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s;}
.week-chip.active{border-color:var(--green);}
.wc-num{font-size:14px;font-weight:800;}
.wc-lbl{font-size:8px;font-weight:600;text-transform:uppercase;margin-top:1px;}
.wc-p1{background:#FFF7ED;} .wc-p1 .wc-num{color:#C2410C;} .wc-p1 .wc-lbl{color:#EA580C;}
.wc-test{background:#EEF2FF;} .wc-test .wc-num{color:#4338CA;} .wc-test .wc-lbl{color:#6366F1;}
.wc-p2{background:#ECFDF5;} .wc-p2 .wc-num{color:#065F46;} .wc-p2 .wc-lbl{color:#059669;}
.week-chip.active .wc-p1{border-color:#C2410C;}

/* SESSION CARD */
.session-card{margin:0 16px;border-radius:var(--radius);overflow:hidden;}
.sc-head{padding:14px 16px;}
.sc-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  opacity:.8;margin-bottom:4px;}
.sc-title{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.sc-meta{font-size:13px;opacity:.7;}
.sc-mode{display:flex;gap:6px;margin-top:12px;}
.mode-btn{flex:1;padding:9px;border-radius:10px;border:none;font-size:13px;
  font-weight:700;cursor:pointer;transition:all .15s;}
.mode-salle{background:rgba(88,166,255,.15);color:var(--blue);}
.mode-salle.active{background:var(--blue);color:#fff;}
.mode-ext{background:rgba(63,185,80,.15);color:var(--green);}
.mode-ext.active{background:var(--green);color:#000;}

/* EXERCISE CARDS */
.ex-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.ex-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:center;gap:12px;border:1px solid var(--border);
  transition:all .2s;cursor:pointer;}
.ex-card.done{opacity:.5;}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--dim);}
.ex-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:14px;transition:all .2s;background:transparent;}
.ex-card.done .ex-check{background:var(--green);border-color:var(--green);color:#000;}
.ex-body{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;margin-bottom:2px;}
.ex-detail{font-size:13px;color:var(--mid);}
.ex-timer-btn{width:36px;height:36px;border-radius:50%;background:var(--card);
  border:1px solid var(--border);color:var(--mid);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* TIMER OVERLAY */
.timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;flex-direction:column;align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(8px);}
.timer-overlay.show{display:flex;}
.timer-label{font-size:14px;font-weight:600;color:var(--mid);margin-bottom:12px;}
.timer-display{font-size:80px;font-weight:800;letter-spacing:-4px;
  font-variant-numeric:tabular-nums;color:var(--text);margin-bottom:16px;}
.timer-display.warning{color:var(--orange);}
.timer-display.done-t{color:var(--green);}
.timer-bar{width:240px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:32px;}
.timer-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .1s;}
.timer-controls{display:flex;gap:12px;}
.t-btn{width:64px;height:64px;border-radius:50%;border:none;font-size:24px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.t-play{background:var(--green);color:#000;}
.t-stop{background:var(--red-d);color:var(--red);}
.timer-presets{display:flex;gap:8px;margin-top:24px;}
.t-preset{padding:8px 16px;border-radius:20px;background:var(--card);
  border:1px solid var(--border);color:var(--mid);font-size:13px;cursor:pointer;}

/* BOTTOM ACTIONS */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 28px;
  background:rgba(13,17,23,.95);border-top:1px solid var(--border);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;gap:10px;}
.log-btn{flex:1;padding:14px;border-radius:var(--radius);border:none;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.log-ok{background:var(--green);color:#000;}
.log-nope{background:var(--red-d);color:var(--red);border:1px solid var(--red);}
.log-ok:active{transform:scale(.97);}
.log-nope:active{transform:scale(.97);}

/* SETUP MODAL */
.setup-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:300;align-items:flex-end;-webkit-backdrop-filter:blur(8px);}
.setup-modal.show{display:flex;}
.setup-sheet{background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 20px 40px;width:100%;}
.setup-handle{width:36px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 16px;}
.setup-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.setup-field{margin-bottom:14px;}
.setup-label{font-size:13px;color:var(--mid);margin-bottom:6px;display:block;}
.setup-input{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;}
.setup-save{width:100%;padding:14px;border-radius:var(--radius);background:var(--green);
  border:none;color:#000;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}

/* STATUS TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--green);color:#000;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red-d);color:var(--red);}

/* REPOS CARD */
.repos-card{margin:12px 16px;background:var(--card);border-radius:var(--radius);
  padding:30px 20px;text-align:center;border:1px solid var(--border);}
.repos-icon{font-size:40px;margin-bottom:8px;}
.repos-text{font-size:16px;color:var(--mid);}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;padding:0 16px;margin-top:10px;}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.prog-text{font-size:11px;color:var(--mid);white-space:nowrap;}
</style>
</head>

<!-- TIMER OVERLAY -->
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-label" id="timer-label">Repos</div>

  <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div></div>
  <div class="timer-controls">
    <button class="t-btn t-stop" onclick="stopTimer()">✕</button>
    <button class="t-btn t-play" id="timer-play-btn" onclick="toggleTimer()">⏸</button>
  </div>
  <div class="timer-presets">
    <button class="t-preset" onclick="setTimer(60)">1 min</button>
    <button class="t-preset" onclick="setTimer(90)">1:30</button>
    <button class="t-preset" onclick="setTimer(120)">2 min</button>
    <button class="t-preset" onclick="setTimer(180)">3 min</button>

</div>

<!-- SETUP MODAL -->
<div class="setup-modal" id="setup-modal">

    <div class="setup-handle"></div>

        <option value="ext">🌳 Extérieur</option>
      </select>
    </div>
    <button class="setup-save" onclick="saveConfig()">Enregistrer</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="tb-title">⚽ Vue du jour</div>
    <div class="tb-date" id="tb-date">—</div>
  </div>
  <button class="tb-btn tb-settings" onclick="openSetup()">⚙️ Config</button>
</div>

<!-- WEEK SELECTOR -->
<div class="section-lbl">Semaine</div>
<div class="week-scroll" id="week-scroll"></div>

<!-- DAY SELECTOR -->
<div class="section-lbl" style="margin-top:14px;">Jour</div>
<div class="day-scroll" id="day-scroll"></div>

<!-- SESSION CONTENT -->
<div id="session-content"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="log-btn log-nope" onclick="logSeance(false)">✗ Non effectuée</button>
  <button class="log-btn log-ok" onclick="logSeance(true)">✓ Effectuée !</button>
</div>

/* ─── STATE ─── */
var timerInterval=null,timerTotal=90,timerRemaining=90,timerRunning=false;

function getConfig(){return JSON.parse(localStorage.getItem('vj_config')||'{}');}
function saveConfigData(d){localStorage.setItem('vj_config',JSON.stringify(d));}
function getChecked(){return JSON.parse(localStorage.getItem('vj_checked_'+currentWeek+'_'+currentDay)||'{}');}
function saveChecked(){localStorage.setItem('vj_checked_'+currentWeek+'_'+currentDay,JSON.stringify(checked));}

function autoDetect(){
  var cfg=getConfig();
  if(!cfg.startDate) return;
  var start=new Date(cfg.startDate);
  var now=new Date();
  var diff=Math.floor((now-start)/(1000*60*60*24));
  var weekNum=Math.min(Math.floor(diff/7)+1,14);
  var dayIdx=now.getDay();
  var dayMap=[6,0,1,2,3,4,5]; // JS Sunday=0, our lun=0
  var ourDay=dayMap[dayIdx];
  currentWeek=Math.max(1,weekNum);
  currentDay=DAYS[ourDay];
}

function init(){
  // Date in topbar
  var now=new Date();
  var days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var months=['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  document.getElementById('tb-date').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];

  var cfg=getConfig();
  currentMode=cfg.defaultMode||'salle';
  autoDetect();
  checked=getChecked();
  renderWeeks();
  renderDays();
  renderSession();
}

function renderWeeks(){
  var html='';
  for(var w=1;w<=14;w++){
    var wData=P[w];
    var cls=wData.cls+' '+(w===currentWeek?'active':'');
    html+='<div class="week-chip '+cls+'" onclick="selectWeek('+w+')">'+
      '<div class="wc-num">'+w+'</div>'+
      '<div class="wc-lbl">'+wData.nom.split(' ')[0]+'</div>'+
    '</div>';
  }
  document.getElementById('week-scroll').innerHTML=html;
  // Scroll to active
  setTimeout(function(){
    var el=document.querySelector('.week-chip.active');
    if(el)el.scrollIntoView({inline:'center',block:'nearest'});
  },100);
}

function renderDays(){
  var html='';
  DAYS.forEach(function(d,i){
    var isActive=d===currentDay;
    var dayData=P[currentWeek]?P[currentWeek].jours[d]:null;
    var type=dayData?dayData.type:'repos';
    var color=TYPE_COLORS[type]?TYPE_COLORS[type].accent:'#484F58';
    html+='<div class="day-chip '+(isActive?'active':'')+'" onclick="selectDay(\''+d+'\')" style="'+(isActive?'':'border-color:'+color+';color:'+color+';')+'">'+
      DAY_LABELS[i]+
    '</div>';
  });
  document.getElementById('day-scroll').innerHTML=html;
}

function renderSession(){
  var w=P[currentWeek];
  if(!w){document.getElementById('session-content').innerHTML='';return;}
  var day=w.jours[currentDay];
  if(!day){document.getElementById('session-content').innerHTML='';return;}
  var tc=TYPE_COLORS[day.type]||TYPE_COLORS.repos;
  var html='';

  if(day.type==='repos'){
    html='<div class="repos-card">'+
      '<div class="repos-icon">😴</div>'+
      '<div class="repos-text">Repos — Récupération complète</div>'+
    '</div>';
  } else {
    // Session header
    html+='<div class="session-card" style="background:'+tc.bg+';">'+
      '<div class="sc-head">'+
        '<div class="sc-type" style="color:'+tc.accent+';">'+tc.label+'</div>'+
        '<div class="sc-title">'+day.t+'</div>'+
        '<div class="sc-meta">⏱ '+day.dur+'</div>'+
        '<div class="sc-mode">'+
          '<button class="mode-btn mode-salle '+(currentMode==='salle'?'active':'')+'" onclick="setMode(\'salle\')">🏋️ Salle</button>'+
          '<button class="mode-btn mode-ext '+(currentMode==='ext'?'active':'')+'" onclick="setMode(\'ext\')">🌳 Extérieur</button>'+
        '</div>'+
      '</div>'+
    '</div>';

    // Progress
    var total=day.ex.length;
    var done=Object.values(checked).filter(Boolean).length;
    if(total>0){
      html+='<div class="progress-row">'+
        '<div class="prog-bar"><div class="prog-fill" style="width:'+Math.round(done/total*100)+'%"></div></div>'+
        '<div class="prog-text">'+done+'/'+total+'</div>'+
      '</div>';
    }

    // Exercise list
    if(total>0){
      html+='<div class="ex-list">';
      day.ex.forEach(function(ex,i){
        var isDone=checked[i]||false;
        var timerHtml=ex.timer?'<button class="ex-timer-btn" onclick="event.stopPropagation();startTimer('+ex.timer+',\''+ex.n+'\')">⏱</button>':'';
        html+='<div class="ex-card '+(isDone?'done':'')+'" onclick="toggleEx('+i+')">'+
          '<div class="ex-check">'+(isDone?'✓':'')+'</div>'+
          '<div class="ex-body">'+
            '<div class="ex-name">'+ex.n+'</div>'+
            '<div class="ex-detail">'+ex.d+'</div>'+
          '</div>'+
          timerHtml+
        '</div>';
      });
      html+='</div>';
    }
  }

  document.getElementById('session-content').innerHTML=html;
}

function selectWeek(w){
  currentWeek=w;
  checked=getChecked();
  renderWeeks();
  renderDays();
  renderSession();
}

function selectDay(d){
  currentDay=d;
  checked=getChecked();
  renderDays();
  renderSession();
}

function setMode(m){
  currentMode=m;
  var cfg=getConfig();
  cfg.defaultMode=m;
  saveConfigData(cfg);
  renderSession();
}

function toggleEx(i){
  checked[i]=!checked[i];
  saveChecked();
  renderSession();
}

/* ─── TIMER ─── */
function startTimer(sec,label){
  timerTotal=sec;timerRemaining=sec;
  document.getElementById('timer-label').textContent=label||'Repos';
  document.getElementById('timer-display').className='timer-display';
  document.getElementById('timer-play-btn').textContent='⏸';
  document.getElementById('timer-overlay').classList.add('show');
  updateTimerDisplay();
  timerRunning=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(tickTimer,1000);
}

function setTimer(sec){
  clearInterval(timerInterval);
  timerTotal=sec;timerRemaining=sec;
  timerRunning=true;
  document.getElementById('timer-display').className='timer-display';
  document.getElementById('timer-play-btn').textContent='⏸';
  updateTimerDisplay();
  timerInterval=setInterval(tickTimer,1000);
}

function tickTimer(){
  if(!timerRunning)return;
  timerRemaining--;
  updateTimerDisplay();
  if(timerRemaining<=0){
    clearInterval(timerInterval);
    document.getElementById('timer-display').className='timer-display done-t';
    document.getElementById('timer-play-btn').textContent='▶';
    timerRunning=false;
    // Vibrate if available
    if(navigator.vibrate)navigator.vibrate([200,100,200]);
  } else if(timerRemaining<=10){
    document.getElementById('timer-display').className='timer-display warning';
  }
}

function updateTimerDisplay(){
  var m=Math.floor(timerRemaining/60);
  var s=timerRemaining%60;
  document.getElementById('timer-display').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  var pct=timerTotal>0?Math.round(timerRemaining/timerTotal*100):0;
  document.getElementById('timer-bar-fill').style.width=pct+'%';
}

function toggleTimer(){
  timerRunning=!timerRunning;
  document.getElementById('timer-play-btn').textContent=timerRunning?'⏸':'▶';
  if(timerRunning)timerInterval=setInterval(tickTimer,1000);
  else clearInterval(timerInterval);
}

function stopTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  document.getElementById('timer-overlay').classList.remove('show');
}

/* ─── SETUP ─── */
function openSetup(){
  var cfg=getConfig();
  document.getElementById('start-date').value=cfg.startDate||'';
  document.getElementById('default-mode').value=cfg.defaultMode||'salle';
  document.getElementById('setup-modal').classList.add('show');
}

function saveConfig(){
  var cfg={
    startDate:document.getElementById('start-date').value,
    defaultMode:document.getElementById('default-mode').value,
  };
  saveConfigData(cfg);
  currentMode=cfg.defaultMode;
  document.getElementById('setup-modal').classList.remove('show');
  autoDetect();
  renderWeeks();renderDays();renderSession();
  showToast('✓ Configuration sauvegardée');
}

/* ─── LOG SÉANCE ─── */
async function logSeance(effectuee){
  var today=new Date().toISOString().split('T')[0];
  var day=P[currentWeek]?P[currentWeek].jours[currentDay]:null;
  var payload={
    date:today,
    semaine:currentWeek,
    type:day?day.t.split(' — ')[0].replace(/[🏋️❤️⚡🌿😴📋⚽]/g,'').trim():'',
    effectuee:effectuee
  };
  try{
    var res=await fetch(SB_URL+'/rest/v1/seances',{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=minimal'
      },
      body:JSON.stringify(payload)
    });
    if(!res.ok)throw new Error('Erreur '+res.status);
    showToast(effectuee?'✓ Séance enregistrée !':'✗ Séance marquée comme manquée');
    // Reset checked for next day
    if(effectuee){checked={};saveChecked();renderSession();}
  }catch(e){
    showToast('⚠️ Erreur : '+e.message,true);
  }
}

/* ─── TOAST ─── */
function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(err?' error':'');
  setTimeout(function(){t.classList.add('show');},10);
  setTimeout(function(){t.classList.remove('show');},2500);
}

/* ─── CLOSE SETUP ON BG CLICK ─── */
document.getElementById('setup-modal').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('show');
});

init();
</script>
